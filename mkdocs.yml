site_name: Mium
site_url: https://cloudcheflabs.github.io/mium-docs
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - header.autohide
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
      primary: custom
      accent: purple
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
      primary: custom
      accent: lime
  logo: images/logo/mium-logo.png
  favicon: images/logo/mium-logo.png


nav:
  - "Home": index.md
  - "Architecture":
      - "Mium Architecture": architecture/architecture.md
  - "Installation":
      - "Prerequisites": installation/prerequisites.md
      - "Install": installation/install.md
      - "Run Mium": installation/running.md
      - "HA Cluster": installation/ha-cluster.md
  - "Configuration":
      - "Reference": configuration/reference.md
  - "Features":
      - "Multi-Agent AI Platform": features/multi-agent-platform.md
      - "LLM Backend": features/llm-backend.md
      - "Tool Integration": features/tool-integration.md
      - "Job Lifecycle": features/job-lifecycle.md
      - "Connection Management": features/connection-management.md
      - "Chat & Memory": features/chat-memory.md
      - "Prompt Library": features/prompt-library.md
      - "Storage Backends": features/storage-backends.md
      - "Temp File Storage": features/temp-file-storage.md
      - "Server-Side Export": features/server-side-export.md
      - "Worker Python Runtime": features/worker-python-runtime.md
      - "IAM": features/iam.md
      - "Admin Password Recovery": features/admin-password-recovery.md
      - "Encryption & KMS": features/encryption.md
      - "High Availability": features/high-availability.md
      - "Backup & Restore": features/backup-restore.md
      - "Admin UI": features/admin-ui.md
  - "Operations":
      - "Monitoring & Observability": operations/monitoring.md
      - "Backup & Restore": operations/backup-restore.md
      - "Retention & Sweeps": operations/retention.md
      - "Troubleshooting": operations/troubleshooting.md
  - "Security":
      - "Hardening Guide": security/hardening.md



extra:
  generator: false
  version:
    provider: mike
    default: 1.0.0


extra_css:
  - stylesheets/extra.css


markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg

copyright: |
  © <script>document.write(new Date().getFullYear())</script> Cloud Chef Labs, Inc. All rights reserved. <a href="mailto:admin@cloudchef-labs.com">admin@cloudchef-labs.com</a>
